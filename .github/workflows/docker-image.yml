name: Docker Image CI

on:
  push:
    branches: [ "main" ]

# Permissões necessárias para que o GitHub salve a imagem no seu perfil
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Fazer login no GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Buildar e Enviar a imagem Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        build-args: |
          SUPABASE_URL=${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}
        tags: ghcr.io/felip2ee/lannywerbeth-site-noivos:latest
