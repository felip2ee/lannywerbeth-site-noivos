version: "3.7"
services:

  lanny_wedding:
    image: ghcr.io/felip2ee/lannywerbeth-site-noivos:latest

    networks:
      - NovaBrNet ## Nome da rede interna

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.http.routers.lanny_wedding.rule=Host(`lannywerbeth.agencianovabr.com`)
        - traefik.http.routers.lanny_wedding.entrypoints=websecure
        - traefik.http.routers.lanny_wedding.tls.certresolver=letsencryptresolver
        - traefik.http.routers.lanny_wedding.priority=1
        - traefik.http.routers.lanny_wedding.service=lanny_wedding
        - traefik.http.services.lanny_wedding.loadbalancer.server.port=80
        - traefik.http.services.lanny_wedding.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.lanny_wedding.middlewares=sslheader

networks:
  NovaBrNet: ## Nome da rede interna
    external: true
    name: NovaBrNet ## Nome da rede interna
